# Optimora local development infrastructure (T-1.3).
#
# Stands up the frozen V2 data/execution-plane components for local dev and tests:
#   - PostgreSQL  : OLTP source of truth (also backs Temporal's dev schema)
#   - Redis       : cache / locks / rate limits / working memory
#   - Qdrant      : vector store (memory + knowledge)
#   - ClickHouse  : OLAP (run_steps, usage_events, audit, analytics)
#   - Temporal    : durable workflow engine (+ Web UI)
#
# Cloud provisioning (AWS EKS/RDS/ElastiCache/etc.) is intentionally NOT here;
# it is deferred to a dedicated Terraform task (see infra/terraform/README.md).
#
# Usage:  pnpm infra:up   /   pnpm infra:down   /   pnpm infra:logs

name: optimora-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: optimora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: optimora
      POSTGRES_PASSWORD: optimora_dev_pw
      POSTGRES_DB: optimora
    ports:
      # Host port 5433 to avoid clashing with a host-local Postgres on 5432.
      # Container-internal port stays 5432, so Temporal (same network) is unaffected.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optimora -d optimora"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: optimora-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Host port 6380 to avoid clashing with a host-local Redis on 6379.
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: optimora-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: optimora-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: optimora
      CLICKHOUSE_PASSWORD: optimora_dev_pw
      CLICKHOUSE_DB: optimora_olap
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: optimora-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: optimora
      POSTGRES_PWD: optimora_dev_pw
      POSTGRES_SEEDS: postgres
      # Bind the frontend on all interfaces so the in-container healthcheck
      # (127.0.0.1:7233) and the host port mapping both work; by default
      # Temporal binds only to the container's broadcast IP.
      BIND_ON_IP: "0.0.0.0"
    ports:
      - "7233:7233" # gRPC frontend
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "127.0.0.1:7233"]
      interval: 10s
      timeout: 5s
      retries: 30

  temporal-ui:
    image: temporalio/ui:2.32.0
    container_name: optimora-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8233:8080"

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  clickhouse-data:
