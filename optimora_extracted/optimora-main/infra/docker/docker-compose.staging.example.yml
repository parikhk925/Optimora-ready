# docker-compose.staging.example.yml — Optimora staging stack (T-30.1)
#
# This is an EXAMPLE only. Copy to docker-compose.staging.yml and configure.
# Never commit docker-compose.staging.yml — it will contain real env values.
#
# All secrets are passed via host environment variables (never hardcoded here).
# Set them in your shell or a secrets manager before running.
#
# Usage:
#   docker compose -f infra/docker/docker-compose.staging.example.yml up -d
#
# Required env vars (set in shell):
#   DATABASE_URL, AUTH_SECRET, NEXT_PUBLIC_TENANT_ID,
#   REDIS_URL (optional), PLATFORM_API_URL (web → platform)
#
# Build images first (from repo root):
#   docker build -f apps/web/Dockerfile \
#     --build-arg NEXT_PUBLIC_TENANT_ID=$NEXT_PUBLIC_TENANT_ID \
#     -t optimora-web:staging .
#   docker build -f services/platform/Dockerfile \
#     -t optimora-platform:staging .

services:
  platform:
    image: optimora-platform:staging
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "${DATABASE_URL}"        # postgresql://...
      AUTH_SECRET: "${AUTH_SECRET}"          # 32+ char secret — never hardcode
      REDIS_URL: "${REDIS_URL:-}"            # optional
      TEMPORAL_ADDRESS: "${TEMPORAL_ADDRESS:-}"
      TEMPORAL_NAMESPACE: "${TEMPORAL_NAMESPACE:-}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    image: optimora-web:staging
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      PLATFORM_API_URL: "${PLATFORM_API_URL:-http://platform:3000}"
      NEXT_PUBLIC_TENANT_ID: "${NEXT_PUBLIC_TENANT_ID}"
      NEXT_PUBLIC_API_KEY: "${NEXT_PUBLIC_API_KEY:-}"
    depends_on:
      platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
